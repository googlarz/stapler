<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <style>
    .arm, .base, .slot { stroke: #18181b; }
    @media (prefers-color-scheme: dark) {
      .arm, .base, .slot { stroke: #e4e4e7; }
    }
  </style>
  <!-- Stapler arm (top) -->
  <path class="arm" stroke-width="2" d="M4 14V9.5A1.5 1.5 0 0 1 5.5 8H20A1.5 1.5 0 0 1 21.5 9.5V14"/>
  <!-- Stapler base (bottom) -->
  <rect class="base" stroke-width="2" x="2" y="14" width="20" height="6.5" rx="2"/>
  <!-- Staple exit slot -->
  <line class="slot" stroke-width="1.5" x1="14.5" y1="18" x2="20.5" y2="18"/>
</svg>
