services:
  paperclip:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "${STAPLER_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      STAPLER_HOME: "/paperclip"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      STAPLER_DEPLOYMENT_MODE: "authenticated"
      STAPLER_DEPLOYMENT_EXPOSURE: "private"
      STAPLER_PUBLIC_URL: "${STAPLER_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${STAPLER_DATA_DIR:-../data/docker-paperclip}:/paperclip"
